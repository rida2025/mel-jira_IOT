apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil-playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wil-app
  template:
    metadata:
      labels:
        app: wil-app
    spec:
      containers:
      - name: wil-container
        image: wil42/playground:v1 # This is the version we start with
        ports:
        - containerPort: 8888      # Wil's app is hardcoded to use this port